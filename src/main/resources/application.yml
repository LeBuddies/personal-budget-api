spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/budget_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always

server:
  port: 8080

jwt:
  secret: budgetApiSecretKeyForJwtTokenGenerationMustBe256Bits
  expiration: 86400000  # 24시간 (ms)

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
